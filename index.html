<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>X0PA AI Intelligence — Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --brand: #163B8D;
  --brand-dark: #0f2a66;
  --brand-darker: #0a1f4d;
  --brand-soft: #e9effd;
  --ink: #0A1330;
  --ink-light: #64748b;
  --bg: #f7f9fc;
  --border: #e5e9f2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-darker) 100%);
  color: var(--ink); min-height: 100vh;
  display: flex; align-items: center; justify-content: center; padding: 24px;
  -webkit-font-smoothing: antialiased;
}
.card {
  background: white; border-radius: 16px; padding: 48px;
  max-width: 540px; width: 100%;
  box-shadow: 0 30px 80px rgba(0,0,0,0.25);
}
.logo-mark {
  width: 44px; height: 44px; background: var(--brand);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 800; font-size: 17px; letter-spacing: -0.5px;
  margin-bottom: 24px;
}
h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
.lede { color: var(--ink-light); font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
.report-list { list-style: none; border-top: 1px solid var(--border); }
.report-list a {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0; border-bottom: 1px solid var(--border);
  text-decoration: none; color: var(--ink); transition: opacity 0.15s;
}
.report-list a:hover { opacity: 0.7; }
.report-title { font-weight: 600; font-size: 15px; }
.report-meta { font-size: 12px; color: var(--ink-light); margin-top: 2px; }
.arrow { font-size: 18px; color: var(--brand); }
.lock {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--ink-light);
  padding: 5px 10px; background: var(--brand-soft); border-radius: 100px;
  margin-top: 20px;
}
.footer { margin-top: 28px; font-size: 12px; color: var(--ink-light); text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-mark">X0</div>
  <h1>X0PA AI Intelligence</h1>
  <p class="lede">SEO performance reports prepared by TheProjectSEO. Select a reporting period to view details.</p>

  <ul class="report-list">
    <li>
      <a href="./2026-04/">
        <div>
          <div class="report-title">April 2026 Report</div>
          <div class="report-meta">Covering 1 Jan – 31 Mar 2026 · Published 17 April 2026</div>
        </div>
        <span class="arrow">→</span>
      </a>
    </li>
  </ul>

  <div class="lock">🔒 Reports are access-code protected</div>

  <div class="footer">Prepared by TheProjectSEO · aditya@theprojectseo.com</div>
</div>
</body>
</html>
